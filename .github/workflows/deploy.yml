name: Deploy to EC2

# --- Trigger: swap between the two phases described in the deploy plan ---
# Phase 1 (most of the 20 days, actively coding features): auto-deploy on push.
on:
  push:
    branches: [main]

# Phase 2 (1-2 days before bảo vệ): comment out the block above and uncomment
# this one instead, so nothing can auto-deploy over a working demo:
# on:
#   workflow_dispatch: {}

permissions:
  id-token: write # required for GitHub OIDC -> AWS role assumption
  contents: read

env:
  AWS_REGION: ap-southeast-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start EC2 instance if stopped
        run: |
          STATE=$(aws ec2 describe-instances \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Current state: $STATE"
          if [ "$STATE" != "running" ]; then
            aws ec2 start-instances --instance-ids "${{ vars.EC2_INSTANCE_ID }}"
          fi
          aws ec2 wait instance-running --instance-ids "${{ vars.EC2_INSTANCE_ID }}"
          aws ec2 wait instance-status-ok --instance-ids "${{ vars.EC2_INSTANCE_ID }}"

      - name: Deploy via SSM Run Command
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{
              "commands": [
                "cd /app",
                "git pull",
                "mkdir -p /home/ec2-user/secrets",
                "aws ssm get-parameter --region ap-southeast-1 --name /learnova/cloudfront/private-key --with-decryption --query Parameter.Value --output text > /home/ec2-user/secrets/cloudfront-private-key.pem",
                "chmod 400 /home/ec2-user/secrets/cloudfront-private-key.pem",
                "docker compose up --build -d"
              ]
            }' \
            --query "Command.CommandId" --output text)

          echo "SSM command: $COMMAND_ID"

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            case "$STATUS" in
              Success) exit 0 ;;
              Failed|Cancelled|TimedOut)
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "${{ vars.EC2_INSTANCE_ID }}"
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1
